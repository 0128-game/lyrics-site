<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>歌詞検索ツール</title>
    <style>
:root {
    --primary-color: #4f46e5;       /* メインのインディゴブルー */
    --primary-hover: #4338ca;
    --danger-color: #ef4444;        /* 削除ボタン等のレッド */
    --danger-hover: #dc2626;
    --warning-color: #f59e0b;       /* 編集ボタン等のイエロー */
    --warning-hover: #d97706;
    --bg-color: #f8fafc;            /* 明るく目に優しい背景色 */
    --card-bg: #ffffff;
    --text-color: #1e293b;          /* 視認性の高いダークグレー */
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
}

/* 全体ベース */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    margin: 0;
    padding: 24px 16px;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

/* ヘッダー */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border-color);
    flex-wrap: wrap;
    gap: 16px;
}

header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, var(--primary-color), #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header div {
    display: flex;
    gap: 8px;
}

/* ボタン共通 */
button {
    background-color: var(--primary-color);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

button:hover {
    background-color: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

button:active {
    transform: translateY(0);
}

.btn-danger {
    background-color: var(--danger-color);
}
.btn-danger:hover {
    background-color: var(--danger-hover);
}

/* セクション切り替え */
.view-section {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
}
.view-section.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* フォーム要素 */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-color);
}

.required::after {
    content: " (必須)";
    color: var(--danger-color);
    font-size: 0.8rem;
    font-weight: normal;
}

input[type="text"],
input[type="url"],
textarea {
    width: 100%;
    padding: 12px 16px;
    box-sizing: border-box;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background-color: #ffffff;
    color: var(--text-color);
    font-size: 0.95rem;
    transition: all 0.2s ease;
}

input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

/* 検索ボックス */
.search-box {
    background: var(--card-bg);
    padding: 24px;
    border-radius: 12px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-color);
}

.search-box h3 {
    margin-top: 0;
    margin-bottom: 16px;
    font-size: 1.1rem;
    font-weight: 700;
}

/* 印刷オプションエリア */
#print-list-options, #print-detail-options {
    margin-top: 12px;
    padding: 12px;
    background-color: var(--bg-color);
    border-radius: 6px;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
}

#print-list-options label, #print-detail-options label {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.85rem;
}

/* 曲リスト一覧 */
.song-item {
    background: var(--card-bg);
    padding: 20px;
    margin-bottom: 12px;
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.song-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.song-item strong {
    font-size: 1.1rem;
    color: var(--text-color);
}

.song-item small {
    display: block;
    margin-top: 4px;
    font-size: 0.85rem;
    color: var(--primary-color);
}

.song-item div:last-child {
    display: flex;
    gap: 8px;
}

/* 詳細表示 */
#detail-view article {
    background: var(--card-bg);
    padding: 32px;
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-color);
}

#detail-view h2 {
    font-size: 1.8rem;
    margin-top: 0;
    margin-bottom: 8px;
}

#view-link-str {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 20px;
}

#view-link-str a {
    color: var(--primary-color);
    text-decoration: none;
}

#view-link-str a:hover {
    text-decoration: underline;
}

/* 歌詞表示エリア */
.lyrics-text {
    white-space: pre-wrap;
    background: var(--bg-color);
    padding: 24px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.8;
    color: #334155;
    margin: 16px 0;
}

/* メモエリア */
#view-memo-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px dashed var(--border-color);
}

#view-memo {
    color: var(--text-muted);
    background-color: #fffbeb;
    border-left: 4px solid #f59e0b;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0 0 0;
}

/* YouTubeプレイヤー埋め込みコンテナ */
.video-container {
    margin-top: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
}

/* バックアップセクション */
#backup-view {
    background: var(--card-bg);
    padding: 32px;
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-color);
}

#backup-view h2 {
    margin-top: 0;
    margin-bottom: 24px;
}

#backup-view h3 {
    font-size: 1.1rem;
    margin-bottom: 8px;
}

#backup-view hr {
    border: 0;
    height: 1px;
    background: var(--border-color);
    margin: 24px 0;
}

/* 印刷用設定（実体） */
@media print {
    body {
        background: white !important;
        color: black !important;
        padding: 0;
    }
    .no-print {
        display: none !important;
    }
    #detail-view article {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    .lyrics-text {
        background: none !important;
        border: none !important;
        padding: 0 !important;
    }
}
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h1>🎵 歌詞管理検索ツール</h1>
        <div>
            <button onclick="switchView('list-view')">一覧・検索</button>
            <button onclick="switchView('form-view'); prepareAdd();">歌詞の追加</button>
            <button onclick="switchView('backup-view')">インポート/エクスポート</button>
        </div>
    </header>

    <section id="list-view" class="view-section active">
        <div class="search-box no-print">
            <h3>検索・絞り込み</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="search-keyword" placeholder="曲名または歌詞で検索..." style="flex: 1; padding: 8px;">
                <input type="text" id="search-tag" placeholder="タグで絞り込み (例: #アニソン)..." style="flex: 1; padding: 8px;">
                <button onclick="displaySongs()">検索</button>
            </div>
            <button onclick="printList()">📋 選択した項目でリストを印刷</button>
            <div id="print-list-options" style="margin-top: 5px; font-size: 0.9em;">
                印刷項目: 
                <label><input type="checkbox" id="p-list-title" checked disabled> ★曲名</label>
                <label><input type="checkbox" id="p-list-link" checked> ★リンク</label>
                <label><input type="checkbox" id="p-list-tags" checked> ★タグ</label>
                <label><input type="checkbox" id="p-list-memo" checked> メモ</label>
            </div>
        </div>

        <div id="songs-list"></div>
    </section>

    <section id="detail-view" class="view-section">
        <div class="no-print" style="margin-bottom: 15px;">
            <button onclick="switchView('list-view')">← 一覧に戻る</button>
            <button id="btn-edit-goto">✏️ 編集する</button>
            <button onclick="printDetail()">🖨️ この曲を印刷</button>
            <div id="print-detail-options" style="margin-top: 5px; font-size: 0.9em;">
                印刷項目: 
                <label><input type="checkbox" id="p-det-title" checked disabled> ★曲名</label>
                <label><input type="checkbox" id="p-det-link" checked> ★リンク</label>
                <label><input type="checkbox" id="p-det-lyrics" checked> ★歌詞</label>
                <label><input type="checkbox" id="p-det-tags" checked> ★タグ</label>
                <label><input type="checkbox" id="p-det-memo" checked> メモ</label>
            </div>
        </div>

        <article id="print-area">
            <h2 id="view-title"></h2>
            <p id="view-link-str"></p>
            <button id="btn-play-video" class="no-print">▶️ 閲覧（動画を再生）</button>
            <div id="video-player" class="video-container no-print"></div>
            <div id="view-tags" style="margin: 10px 0; color: #4a90e2; font-weight: bold;"></div>
            <h3>歌詞</h3>
            <div id="view-lyrics" class="lyrics-text"></div>
            <div id="view-memo-section">
                <h3>メモ</h3>
                <p id="view-memo"></p>
            </div>
        </article>
    </section>

    <section id="form-view" class="view-section">
        <h2 id="form-mode-title">歌詞の追加</h2>
        <form id="lyrics-form" onsubmit="saveSong(event)">
            <input type="hidden" id="form-id">
            <div class="form-group">
                <label for="form-title" class="required">曲名</label>
                <input type="text" id="form-title" required>
            </div>
            <div class="form-group">
                <label for="form-link" class="required">曲のリンク (YouTubeなどのURL)</label>
                <input type="url" id="form-link" required placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <div class="form-group">
                <label for="form-lyrics" class="required">歌詞</label>
                <textarea id="form-lyrics" rows="10" required></textarea>
            </div>
            <div class="form-group">
                <label for="form-tags" class="required">タグ (スペース区切り、#を付けてください)</label>
                <input type="text" id="form-tags" required placeholder="#JPOP #ロック #2026年">
            </div>
            <div class="form-group">
                <label for="form-memo">メモ</label>
                <textarea id="form-memo" rows="3"></textarea>
            </div>
            <button type="submit">保存する</button>
            <button type="button" class="btn-danger" onclick="switchView('list-view')">キャンセル</button>
        </form>
    </section>

    <section id="backup-view" class="view-section">
        <h2>全体読み込み / 書き出し (JSON)</h2>
        <div style="margin-bottom: 20px;">
            <h3>全体書き出し (エクスポート)</h3>
            <button onclick="exportJSON()">JSONファイルをダウンロード</button>
        </div>
        <hr>
        <div>
            <h3>全体読み込み (インポート)</h3>
            <p style="color: var(--danger-color); font-size: 0.9em;">※現在のデータはすべて上書きされます。</p>
            <input type="file" id="import-file" accept=".json">
            <button onclick="importJSON()">JSONから復元する</button>
        </div>
    </section>
</div>

<script>
    // --- IndexedDB の設定 ---
    const DB_NAME = 'LyricsManagerDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'lyrics';
    let db;

    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = (e) => console.error("Database error: ", e.target.error);
    request.onsuccess = (e) => {
        db = e.target.result;
        displaySongs();
    };
    request.onupgradeneeded = (e) => {
        let db = e.target.result;
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
    };

    // --- 画面切り替えライブラリ的処理 ---
    function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(section => {
            section.classList.remove('active');
        });
        document.getElementById(viewId).classList.add('active');
        // YouTube動画を止めるためにプレイヤーをクリア
        document.getElementById('video-player').innerHTML = '';
    }

    // --- 歌詞追加・編集の処理 ---
    function prepareAdd() {
        document.getElementById('form-mode-title').innerText = "歌詞の追加";
        document.getElementById('lyrics-form').reset();
        document.getElementById('form-id').value = '';
    }

    function saveSong(e) {
        e.preventDefault();
        const id = document.getElementById('form-id').value;
        const songData = {
            title: document.getElementById('form-title').value,
            link: document.getElementById('form-link').value,
            lyrics: document.getElementById('form-lyrics').value,
            tags: document.getElementById('form-tags').value.split(/\s+/).filter(t => t.startsWith('#')),
            memo: document.getElementById('form-memo').value
        };

        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);

        if (id) {
            songData.id = Number(id);
            store.put(songData);
        } else {
            store.add(songData);
        }

        transaction.oncomplete = () => {
            alert('保存しました！');
            switchView('list-view');
            displaySongs();
        };
    }

    function prepareEdit(id) {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const req = store.get(id);

        req.onsuccess = () => {
            const song = req.result;
            document.getElementById('form-mode-title').innerText = "歌詞の編集";
            document.getElementById('form-id').value = song.id;
            document.getElementById('form-title').value = song.title;
            document.getElementById('form-link').value = song.link;
            document.getElementById('form-lyrics').value = song.lyrics;
            document.getElementById('form-tags').value = song.tags.join(' ');
            document.getElementById('form-memo').value = song.memo || '';
            switchView('form-view');
        };
    }

    function deleteSong(id) {
        if(!confirm('本当に削除しますか？')) return;
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        store = transaction.objectStore(STORE_NAME).delete(id);
        transaction.oncomplete = () => {
            displaySongs();
        };
    }

    // --- 閲覧・検索の処理 ---
    function displaySongs() {
        const keyword = document.getElementById('search-keyword').value.toLowerCase();
        const tagFilter = document.getElementById('search-tag').value.trim();
        const listDiv = document.getElementById('songs-list');
        listDiv.innerHTML = '';

        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const song = cursor.value;
                
                // 検索ロジック
                const matchKeyword = !keyword || song.title.toLowerCase().includes(keyword) || song.lyrics.toLowerCase().includes(keyword);
                const matchTag = !tagFilter || song.tags.includes(tagFilter);

                if (matchKeyword && matchTag) {
                    const item = document.createElement('div');
                    item.className = 'song-item';
                    item.innerHTML = `
                        <div>
                            <strong>${escapeHtml(song.title)}</strong><br>
                            <small style="color: #4a90e2">${escapeHtml(song.tags.join(' '))}</small>
                        </div>
                        <div>
                            <button onclick="viewDetail(${song.id})">🔍 閲覧</button>
                            <button onclick="prepareEdit(${song.id})" style="background-color: #f0ad4e;">✏️ 編集</button>
                            <button class="btn-danger" onclick="deleteSong(${song.id})">🗑️ 削除</button>
                        </div>
                    `;
                    listDiv.appendChild(item);
                }
                cursor.continue();
            } else if (listDiv.innerHTML === '') {
                listDiv.innerHTML = '<p>該当する曲が見つかりません。</p>';
            }
        };
    }

    function viewDetail(id) {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const req = store.get(id);

        req.onsuccess = () => {
            const song = req.result;
            document.getElementById('view-title').innerText = song.title;
            document.getElementById('view-link-str').innerHTML = `リンク: <a href="${song.link}" target="_blank" id="target-link">${song.link}</a>`;
            document.getElementById('view-tags').innerText = song.tags.join(' ');
            document.getElementById('view-lyrics').innerText = song.lyrics;
            
            if(song.memo) {
                document.getElementById('view-memo-section').style.display = 'block';
                document.getElementById('view-memo').innerText = song.memo;
            } else {
                document.getElementById('view-memo-section').style.display = 'none';
            }

            // 編集導線＆YouTube再生ボタン設定
            document.getElementById('btn-edit-goto').onclick = () => prepareEdit(song.id);
            document.getElementById('btn-play-video').onclick = () => embedYoutube(song.link);

            switchView('detail-view');
        };
    }

    // YouTubeリンクから埋め込みコードを作る関数
    function embedYoutube(url) {
        const playerDiv = document.getElementById('video-player');
        let videoId = '';
        
        try {
            const urlObj = new URL(url);
            if (urlObj.hostname === 'youtu.be') {
                videoId = urlObj.pathname.slice(1);
            } else if (urlObj.hostname.includes('youtube.com')) {
                videoId = urlObj.searchParams.get('v');
            }
        } catch (e) { console.error("URL解析に失敗しました。"); }

        if (videoId) {
            playerDiv.innerHTML = `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            playerDiv.innerHTML = `<p style="color:var(--danger-color)">YouTubeの再生に対応していない形式のリンクです。上の文字リンクから直接開いてください。</p>`;
        }
    }

    // --- 印刷機能 ---
    function printDetail() {
        // オプション選択による表示切り替え
        document.getElementById('view-link-str').style.display = document.getElementById('p-det-link').checked ? 'block' : 'none';
        document.getElementById('view-lyrics').style.display = document.getElementById('p-det-lyrics').checked ? 'block' : 'none';
        document.getElementById('view-tags').style.display = document.getElementById('p-det-tags').checked ? 'block' : 'none';
        document.getElementById('view-memo-section').style.display = document.getElementById('p-det-memo').checked ? 'block' : 'none';
        
        window.print();
        
        // 印刷完了後に元に戻す
        document.getElementById('view-link-str').style.display = 'block';
        document.getElementById('view-lyrics').style.display = 'block';
        document.getElementById('view-tags').style.display = 'block';
        document.getElementById('view-memo-section').style.display = 'block';
    }

    function printList() {
        const showLink = document.getElementById('p-list-link').checked;
        const showTags = document.getElementById('p-list-tags').checked;
        const showMemo = document.getElementById('p-list-memo').checked;

        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        
        let printWindow = window.open('', '_blank');
        printWindow.document.write('<html><head><title>歌詞リスト印刷</title><style>body{font-family:sans-serif; padding:20px;} .item{border-bottom:1px solid #ccc; padding:10px 0;}</style></head><body><h2>歌詞リスト</h2>');

        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const song = cursor.value;
                printWindow.document.write('<div class="item">');
                printWindow.document.write(`<h3>${escapeHtml(song.title)}</h3>`);
                if(showLink) printWindow.document.write(`<p>リンク: ${escapeHtml(song.link)}</p>`);
                if(showTags) printWindow.document.write(`<p>タグ: ${escapeHtml(song.tags.join(' '))}</p>`);
                if(showMemo && song.memo) printWindow.document.write(`<p>メモ: ${escapeHtml(song.memo)}</p>`);
                printWindow.document.write('</div>');
                cursor.continue();
            } else {
                printWindow.document.write('</body></html>');
                printWindow.document.close();
                printWindow.focus();
                printWindow.print();
                printWindow.close();
            }
        };
    }

    // --- バックアップ（JSON）機能 ---
    function exportJSON() {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const allData = [];

        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                allData.push(cursor.value);
                cursor.continue();
            } else {
                const dataStr = JSON.stringify(allData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `lyrics_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        };
    }

    function importJSON() {
        const fileInput = document.getElementById('import-file');
        if (!fileInput.files.length) {
            alert('JSONファイルを選択してください。');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (!Array.isArray(importedData)) throw new Error('データ形式が正しくありません');

                // 現在のデータをクリアして再登録
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                
                store.clear().onsuccess = () => {
                    importedData.forEach(item => {
                        // idは自動インクリメントに任せるか保持するか（今回は上書き復元のためそのまま挿入）
                        delete item.id; 
                        store.add(item);
                    });
                };

                transaction.oncomplete = () => {
                    alert('データのインポートが完了しました！');
                    switchView('list-view');
                    displaySongs();
                };

            } catch (err) {
                alert('ファイルのインポートに失敗しました。正しいJSONファイルか確認してください。');
            }
        };
        reader.readAsText(file);
    }

    // エスケープ処理（セキュリティ対策）
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
</script>
